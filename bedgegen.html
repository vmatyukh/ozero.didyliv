<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Хижа Ліга — Генератор бейджиків</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#005356;--brand-dark:#003d40}
body{font-family:'Barlow Condensed',sans-serif;background:#f4f4f2;color:#222;min-height:100vh}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid #e0e0e0;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding-bottom:1rem;border-bottom:1px solid #eee}
.sidebar-logo svg{width:32px;height:32px}
.sidebar-logo span{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--brand)}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em}
.field input,.field textarea{font-family:'Barlow Condensed',sans-serif;font-size:14px;padding:8px 10px;border:1px solid #ddd;background:#fafafa;color:#222;outline:none}
.field input:focus,.field textarea:focus{border-color:var(--brand)}
.field textarea{resize:vertical;min-height:120px;font-size:13px}
.field .hint{font-size:11px;color:#999;margin-top:2px}
.logo-preview-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
.logo-thumb{width:48px;height:48px;border:1px solid #ddd;background:#fff;object-fit:contain;display:none}
.logo-thumb.vis{display:block}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;padding:10px 18px;border:none;cursor:pointer;letter-spacing:.04em}
.btn-primary{background:var(--brand);color:#fff;width:100%}
.btn-primary:hover{background:var(--brand-dark)}
.btn-secondary{background:#eee;color:#444;width:100%}
.btn-secondary:hover{background:#ddd}
.stat{font-size:13px;color:var(--brand);font-weight:700;text-align:center;min-height:18px}

/* PREVIEW */
.preview{padding:2rem;overflow:auto;display:flex;flex-direction:column;align-items:center;gap:1rem;background:#666}
.preview-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#bbb}

/*
  A4 landscape = 297×210mm | Preview: 1mm = 2.835px
  Badge = 90×52mm → 255×147px
  3 cols × 4 rows = 12 badges per page
*/
.a4-sheet{width:841px;height:595px;background:#fff;position:relative;overflow:hidden;box-shadow:0 4px 28px rgba(0,0,0,.5);flex-shrink:0}
.a4-rows{width:100%;height:100%;display:flex;flex-direction:column}
.a4-row{display:flex;flex-direction:row}

/* Badge */
.badge{width:255px;height:147px;background:#fff;font-family:'Barlow Condensed',sans-serif;display:flex;flex-direction:column;padding:8px 8px 6px 18px;border-bottom:1px solid #e0e0e0;overflow:hidden;flex-shrink:0}
.b-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;flex:1;min-height:0}
.b-num{font-family:'Bebas Neue',sans-serif;font-size:72px;line-height:1;color:var(--brand);letter-spacing:-1px;flex-shrink:0;margin-top:4px}
.b-logo-wrap{flex-shrink:0;margin-top:4px}
.b-logo-img{height:70px;max-width:90px;object-fit:contain;display:block}
.b-name-block{flex-shrink:0}
.b-surname{font-family:'Bebas Neue',sans-serif;font-size:16px;line-height:1.1;color:var(--brand);text-transform:uppercase;word-break:break-word}
.b-firstname{font-size:10px;font-weight:600;color:var(--brand);opacity:.65;text-transform:uppercase;word-break:break-word;margin-top:1px}
.b-empty{width:255px;height:147px;background:#fff;border-bottom:1px solid #e0e0e0;flex-shrink:0}

/* Cut lines */
.cut-v{position:absolute;top:0;bottom:0;width:1px;background:repeating-linear-gradient(to bottom,#bbb 0,#bbb 5px,transparent 5px,transparent 10px);z-index:20;pointer-events:none}
.cut-h{position:absolute;left:0;right:0;height:1px;background:repeating-linear-gradient(to right,#bbb 0,#bbb 5px,transparent 5px,transparent 10px);z-index:20;pointer-events:none}

@media print{
  .sidebar,.preview-label{display:none}
  .preview{padding:0;background:#fff}
  @page{size:A4 landscape;margin:0}
  body{background:#fff}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" fill="#005356" opacity=".15"/>
        <ellipse cx="20" cy="22" rx="10" ry="8" fill="#005356"/>
        <ellipse cx="12" cy="18" rx="4.5" ry="5" fill="#005356"/>
        <ellipse cx="28" cy="18" rx="4.5" ry="5" fill="#005356"/>
        <circle cx="20" cy="14" r="7" fill="#005356"/>
        <circle cx="17" cy="13" r="1.8" fill="#fff"/>
        <circle cx="23" cy="13" r="1.8" fill="#fff"/>
        <ellipse cx="20" cy="17" rx="3" ry="2" fill="#003d40"/>
        <rect x="15" y="16" width="10" height="3" rx="1.5" fill="#003d40"/>
        <ellipse cx="10" cy="22" rx="2.5" ry="4" fill="#003d40"/>
        <ellipse cx="30" cy="22" rx="2.5" ry="4" fill="#003d40"/>
        <path d="M13 28 Q20 32 27 28" stroke="#003d40" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="20" cy="4" r="3" fill="#005356" opacity=".9"/>
      </svg>
      <span>Хижа Ліга</span>
    </div>

    <div class="field">
      <label>Логотип (PNG / SVG)</label>
      <div class="logo-preview-wrap">
        <input type="file" id="logoFile" accept="image/*" onchange="loadLogo(this)" style="flex:1;font-size:12px">
        <img id="logoThumb" class="logo-thumb" alt="logo">
      </div>
    </div>

    <div class="field">
      <label>Учасники</label>
      <textarea id="pasteData" placeholder="Вставте з Excel:&#10;1&#9;Шевченко&#9;Тарас&#10;2&#9;Франко&#9;Іван" oninput="render()"></textarea>
      <span class="hint">Колонки через Tab: Номер · Прізвище · Ім'я</span>
    </div>

    <div id="stat" class="stat"></div>
    <button class="btn btn-primary" onclick="printAll()">🖨 Друкувати</button>
    <button class="btn btn-secondary" onclick="loadDemo()">Демо-дані</button>
  </aside>

  <main class="preview">
    <div class="preview-label">Прев'ю — А4 альбомна · 90×52мм · 12 бейджів на аркуш</div>
    <div class="a4-sheet" id="sheet"></div>
  </main>
</div>

<script>
const COLS = 3, ROWS = 4, PER_PAGE = 12;
let logoDataUrl = null;

function loadLogo(input) {
  const file = input.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    logoDataUrl = e.target.result;
    document.getElementById('logoThumb').src = logoDataUrl;
    document.getElementById('logoThumb').classList.add('vis');
    render();
  };
  r.readAsDataURL(file);
}

function parseData() {
  const raw = document.getElementById('pasteData').value.trim();
  if (!raw) return [];
  return raw.split('\n')
    .map(l => { const p = l.split(/\t|;/); return { num:(p[0]||'').trim(), surname:(p[1]||'').trim(), firstname:(p[2]||'').trim() }; })
    .filter(p => p.num);
}

function makeBadgeEl(p) {
  const div = document.createElement('div');
  if (!p) { div.className = 'b-empty'; return div; }
  const logo = logoDataUrl ? `<img class="b-logo-img" src="${logoDataUrl}" alt="">` : '';
  div.className = 'badge';
  div.innerHTML = `
    <div class="b-top">
      <div class="b-num">${p.num}</div>
      <div class="b-logo-wrap">${logo}</div>
    </div>
    <div class="b-name-block">
      <div class="b-surname">${p.surname}</div>
      <div class="b-firstname">${p.firstname}</div>
    </div>`;
  return div;
}

function render() {
  const players = parseData();
  const sheet = document.getElementById('sheet');

  // Cut lines
  sheet.innerHTML = `
    <div class="cut-v" style="left:0"></div>
    <div class="cut-v" style="left:255px"></div>
    <div class="cut-v" style="left:510px"></div>
    <div class="cut-v" style="left:765px"></div>`;

  const rowsEl = document.createElement('div');
  rowsEl.className = 'a4-rows';
  rowsEl.style.position = 'relative';
  for (let r = 0; r < ROWS; r++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'a4-row';
    for (let c = 0; c < COLS; c++) rowEl.appendChild(makeBadgeEl(players[r * COLS + c] || null));
    rowsEl.appendChild(rowEl);
  }
  // horizontal cut lines inside rowsEl (on top of badges)
  [147, 294, 441].forEach(top => {
    const l = document.createElement('div');
    l.className = 'cut-h';
    l.style.top = top + 'px';
    rowsEl.appendChild(l);
  });
  sheet.appendChild(rowsEl);

  const pages = Math.ceil(players.length / PER_PAGE) || 1;
  document.getElementById('stat').textContent = players.length
    ? `${players.length} учасників · ${pages} ${pages===1?'аркуш':pages<5?'аркуші':'аркушів'} А4` : '';
}

function badgePrintHtml(p) {
  const logo = logoDataUrl ? `<img style="height:40mm;max-width:32mm;object-fit:contain;display:block" src="${logoDataUrl}" alt="">` : '';
  return `<div style="width:90mm;height:52mm;background:#fff;font-family:'Barlow Condensed',sans-serif;display:flex;flex-direction:column;padding:1.5mm 3mm 2mm 7mm;overflow:hidden;flex-shrink:0">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:2mm;flex:1;min-height:0">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:30mm;line-height:1;color:#005356;letter-spacing:-.3mm;flex-shrink:0;margin-top:2mm">${p.num}</div>
      <div style="flex-shrink:0;margin-top:1mm">${logo}</div>
    </div>
    <div style="flex-shrink:0">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:5.5mm;line-height:1.1;color:#005356;text-transform:uppercase;word-break:break-word">${p.surname}</div>
      <div style="font-size:3mm;font-weight:600;color:#005356;opacity:.7;text-transform:uppercase;word-break:break-word">${p.firstname}</div>
    </div>
  </div>`;
}

function cutV(left) {
  return `<div style="position:absolute;top:0;bottom:0;left:${left};width:1px;background:repeating-linear-gradient(to bottom,#aaa 0,#aaa 2mm,transparent 2mm,transparent 4mm);z-index:99"></div>`;
}
function cutH(top) {
  return `<div style="position:absolute;left:0;right:0;top:${top};height:1px;background:repeating-linear-gradient(to right,#aaa 0,#aaa 2mm,transparent 2mm,transparent 4mm);z-index:99"></div>`;
}

function printAll() {
  const players = parseData();
  if (!players.length) { alert('Додайте учасників!'); return; }

  const pages = Math.ceil(players.length / PER_PAGE);
  let body = '';

  for (let pg = 0; pg < pages; pg++) {
    const slice = players.slice(pg * PER_PAGE, pg * PER_PAGE + PER_PAGE);
    let rows = '';
    for (let r = 0; r < ROWS; r++) {
      let row = `<div style="display:flex">`;
      for (let c = 0; c < COLS; c++) {
        const p = slice[r * COLS + c];
        row += p ? badgePrintHtml(p) : `<div style="width:90mm;height:52mm;flex-shrink:0"></div>`;
      }
      rows += row + `</div>`;
    }
    body += `<div style="width:297mm;height:210mm;background:#fff;position:relative;page-break-after:always;overflow:hidden">
      ${cutV('0')} ${cutV('90mm')} ${cutV('180mm')} ${cutV('270mm')}
      ${cutH('52mm')} ${cutH('104mm')} ${cutH('156mm')}
      ${rows}
    </div>`;
  }

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0}@page{size:A4 landscape;margin:0}body{margin:0}</style>
  </head><body>${body}</body></html>`);
  win.document.close();
  setTimeout(() => { win.focus(); win.print(); }, 800);
}

function loadDemo() {
  document.getElementById('pasteData').value =
    '1\tШевченко\tТарас\n2\tФранко\tІван\n3\tУкраїнка\tЛеся\n4\tКоцюбинський\tМихайло\n5\tСтефаник\tВасиль\n6\tНечуй-Левицький\tІван\n7\tМирний\tПанас\n8\tМаковей\tОсип\n9\tКропивницький\tМарко\n10\tГончар\tОлесь\n11\tКулішенко\tПетро\n12\tВернигора\tСофія';
  render();
}

render();
</script>
</body>
</html>
