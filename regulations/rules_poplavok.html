<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Регламент — Дідилівський поплавок 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #005356; --green-dark: #003a3c; --green-mid: #00888d;
    --bg: #011516; --bg2: #02292a; --surface: #032e2f;
    --border: rgba(0,83,86,0.35); --text: #f0f4f1; --text-muted: #8aab96;
    --font-display: 'Oswald', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  .top-bar { display: flex; align-items: center; gap: 10px; padding: 16px 24px 20px; max-width: 860px; margin: 0 auto; }
  .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; text-decoration: none; }
  .back-btn svg { width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .page-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--text); }

  .rules-wrap { max-width: 860px; margin: 0 auto; padding: 0 24px 60px; }
  .r-hero { text-align: center; padding: 0 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .r-hero-title { font-family: var(--font-display); font-size: 32px; font-weight: 600; color: var(--green-mid); letter-spacing: 0.02em; margin-bottom: 6px; }
  .r-hero-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
  .r-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .r-nav a { font-size: 12px; color: var(--text-muted); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; cursor: pointer; background: var(--surface); transition: all 0.15s; text-decoration: none; white-space: nowrap; }
  .r-nav a:hover { background: var(--green); color: #fff; border-color: var(--green); }
  .r-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0 40px; }
  .r-body .r-section:nth-child(1), .r-body .r-section:nth-child(2), .r-body .r-section:nth-child(3) { grid-column: 1 / -1; }
  @media (max-width: 680px) { .r-body { grid-template-columns: 1fr; } .top-bar { padding: 16px 16px 20px; } .rules-wrap { padding: 0 16px 60px; } }
  .r-section { margin-bottom: 28px; }
  .r-sec-title { font-family: var(--font-display); font-size: 13px; font-weight: 500; color: var(--green-mid); text-transform: uppercase; letter-spacing: 0.09em; border-left: 3px solid var(--green); padding-left: 10px; margin-bottom: 12px; }
  .r-list { list-style: none; border-top: 1px solid var(--border); }
  .r-list li { font-size: 14px; color: var(--text); line-height: 1.6; padding: 9px 4px 9px 20px; border-bottom: 1px solid var(--border); position: relative; }
  .r-list li:last-child { border-bottom: none; }
  .r-list li::before { content: ""; position: absolute; left: 4px; top: 17px; width: 6px; height: 6px; border-radius: 50%; background: var(--green-mid); }
  .r-subhead { font-size: 11px; font-weight: 500; color: var(--green-mid); text-transform: uppercase; letter-spacing: 0.07em; margin: 10px 0 2px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .r-table-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .r-table { width: 100%; border-collapse: collapse; }
  .r-table thead tr { background: var(--green); }
  .r-table thead td { font-family: var(--font-display); font-size: 13px; color: #fff; padding: 10px 14px; letter-spacing: 0.05em; }
  .r-table tbody tr { border-bottom: 1px solid var(--border); }
  .r-table tbody tr:last-child { border-bottom: none; }
  .r-table tbody tr:nth-child(even) { background: rgba(0,83,86,0.07); }
  .r-table tbody td { padding: 9px 14px; font-size: 13px; color: var(--text); vertical-align: top; }
  .r-table tbody td:first-child { font-family: var(--font-display); color: var(--green-mid); white-space: nowrap; }
  .r-table tbody td.muted { color: var(--text-muted); }
  .fish-pills { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0 4px; }
  .fish-pill { background: rgba(0,83,86,0.2); border: 1px solid var(--border); color: var(--green-mid); font-size: 12px; font-weight: 500; padding: 3px 12px; border-radius: 20px; }
  .award-list { border-top: 1px solid var(--border); }
  .award-row { display: flex; gap: 12px; align-items: center; padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .award-row:last-child { border-bottom: none; }
  .medal { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 13px; font-weight: 600; }
  .m1 { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.35); color: #FFD700; }
  .m2 { background: rgba(192,192,192,0.1); border: 1px solid rgba(192,192,192,0.25); color: #C0C0C0; }
  .m3 { background: rgba(205,127,50,0.12); border: 1px solid rgba(205,127,50,0.3); color: #CD7F32; }
  .award-text { font-size: 14px; color: var(--text); }
  .r-note { background: rgba(0,83,86,0.1); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 10px 12px; font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-top: 10px; }
  .r-footer { text-align: center; padding: 24px 0 32px; border-top: 1px solid var(--border); margin-top: 8px; }
  .r-footer-slava { font-family: var(--font-display); font-size: 16px; color: var(--green-mid); letter-spacing: 0.05em; margin-bottom: 16px; }
  .btn-outline { height: 52px; border-radius: 10px; font-size: 16px; font-weight: 500; border: 1.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; font-family: var(--font-display); letter-spacing: 0.03em; transition: background 0.15s; padding: 0 24px; }
  .btn-outline:hover { background: rgba(0,83,86,0.12); }
</style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" href="javascript:history.back()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </a>
  <div class="page-title">Назад</div>
</div>

<div class="rules-wrap">
  <div class="r-hero">
    <div class="r-hero-title">Дідилівський поплавок 2026</div>
    <div class="r-hero-sub">Регламент змагань зі спортивної ловлі на поплавок · Озеро Дідилів</div>
  </div>
  <div class="r-body">
Регламент згодом буде додано. Слідкуйте за оновленнями на сайті та в наших соцмережах!
  </div>
  <div class="r-footer">
    <div class="r-footer-slava">Слава Україні! 🇺🇦</div>
    <button class="btn-outline" onclick="history.back()">← Назад</button>
  </div>
</div>

</body>
</html>
