<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Генератор жеребу</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial Narrow', Arial, sans-serif; background: #e4eeed; }
  #ui { background: #005356; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; border-bottom: 3px solid #003a3c; }
  #ui h1 { font-size: 14px; font-weight: bold; letter-spacing: 1.5px; flex: 1; }
  #ui label { font-size: 11px; opacity: 0.8; }
  #ui input[type=number] { width: 70px; padding: 5px 8px; border: none; border-radius: 4px; font-size: 14px; text-align: center; }
  #ui input[type=text] { width: 240px; padding: 5px 8px; border: none; border-radius: 4px; font-size: 14px; }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .btn-generate { background: #fff; color: #005356; }
  .btn-print { background: rgba(255,255,255,0.18); color: #fff; border: 1.5px solid rgba(255,255,255,0.45); }
  .btn:hover { opacity: 0.85; }
  #pages { padding: 20px; }
  .draw-section { margin-bottom: 36px; }
  .draw-section > h2 { text-align: center; font-size: 11px; color: #005356; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }
  .page { width: 210mm; height: 297mm; background: #fff; margin: 0 auto 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 2px 12px rgba(0,83,86,0.18); padding: 3mm; }
  .page-title { background: #fff; color: #000; border-bottom: 1.5px solid #000; height: 7mm; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 7.5pt; font-weight: bold; letter-spacing: 2px; }
  .cards-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: calc((297mm - 6mm - 7mm) / 10); align-content: start; overflow: hidden; }
  .card { border-right: 2px dashed #aaa; border-bottom: 2px dashed #aaa; display: flex; flex-direction: column; overflow: hidden; }
  .card:nth-child(odd) { border-left: 2px dashed #aaa; }
  .card:nth-child(-n+2) { border-top: 2px dashed #aaa; }
  .card-header { background: #fff; border-bottom: 2px solid #005356; display: flex; align-items: center; justify-content: space-between; padding: 2px 6px; gap: 3px; height: 12mm; flex-shrink: 0; }
  .logo-wrap { width: 22mm; height: 10mm; display: flex; align-items: center; flex-shrink: 0; }
  .logo-wrap img { width: 22mm; height: 10mm; object-fit: contain; }
  .hdr-title { flex: 1; text-align: center; font-size: 8pt; font-weight: bold; letter-spacing: 0.8px; line-height: 1.35; color: #005356; }
  .card-body { flex: 1; display: grid; grid-template-columns: 1fr 0.5px 1fr; }
  .col-divider { background: #ccc; width: 1px; }
  .col { display: flex; flex-direction: column; justify-content: space-between; padding: 4px 8px 5px; overflow: hidden; }
  .tour-label { font-size: 8pt; font-weight: bold; color: #aaa; letter-spacing: 1px; text-align: center; }
  .zone-start { display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 100%; }
  .zs-lbl { font-size: 8.5pt; font-weight: 600; color: #888; }
  .zs-val { font-size: 20pt; font-weight: 900; line-height: 1; }
  .zone-a .zs-val { color: #4a9a9d; }
  .zone-b .zs-val { color: #5aaa80; }
  @media print {
    #ui { display: none !important; }
    #pages { padding: 0; background: none; }
    .draw-section > h2 { display: none; }
    html, body { margin: 0 !important; padding: 0 !important; }
    .page { box-shadow: none; margin: 0 !important; padding: 3mm !important; page-break-after: always; }
    .page:last-child { page-break-after: avoid; }
    body { background: none; }
    @page { margin: 0 !important; size: A4 portrait; }
  }
</style>
</head>
<body>
<div id="ui">
  <h1>🎣 ГЕНЕРАТОР ЖЕРЕБУ</h1>
  <div class="field"><label>УЧАСНИКІВ</label><input type="number" id="count" value="60" min="2" max="200"></div>
  <div class="field"><label>НАЗВА ЗМАГАННЯ</label><input type="text" id="title" value="Хижа Ліга Дідилів"></div>
  <button class="btn btn-generate" onclick="generate()">▶ ЗРОБИТИ ЖЕРЕБ</button>
  <button class="btn btn-print" onclick="printDraw(1)">🖨 Друк Тури 1–2</button>
  <button class="btn btn-print" onclick="printDraw(2)">🖨 Друк Тури 3–4</button>
</div>
<div id="pages"></div>

const PCSS=`* { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Arial Narrow', Arial, sans-serif; }
    .page { width: 210mm; height: 297mm; display: flex; flex-direction: column; page-break-after: always; overflow: hidden; padding: 3mm; }
    .page:last-child { page-break-after: avoid; }
    .page-title { background: #fff; color: #000; border-bottom: 1.5px solid #000; height: 7mm; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 7.5pt; font-weight: bold; letter-spacing: 2px; }
    .cards-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: calc((297mm - 6mm - 7mm) / 10); align-content: start; overflow: hidden; }
    .card { border-right: 2px dashed #aaa; border-bottom: 2px dashed #aaa; display: flex; flex-direction: column; overflow: hidden; }
    .card:nth-child(odd) { border-left: 2px dashed #aaa; }
    .card:nth-child(-n+2) { border-top: 2px dashed #aaa; }
    .card-header { background: #fff; border-bottom: 2px solid #005356; display: flex; align-items: center; justify-content: space-between; padding: 2px 6px; gap: 3px; height: 12mm; flex-shrink: 0; }
    .logo-wrap { width: 22mm; height: 10mm; display: flex; align-items: center; flex-shrink: 0; }
    .logo-wrap img { width: 22mm; height: 10mm; object-fit: contain; }
    .hdr-title { flex: 1; text-align: center; font-size: 8pt; font-weight: bold; letter-spacing: 0.8px; line-height: 1.35; color: #005356; }
    .card-body { flex: 1; display: grid; grid-template-columns: 1fr 0.5px 1fr; }
    .col-divider { background: #ccc; width: 1px; }
    .col { display: flex; flex-direction: column; justify-content: space-between; padding: 4px 8px 5px; overflow: hidden; }
    .tour-label { font-size: 8pt; font-weight: bold; color: #aaa; letter-spacing: 1px; text-align: center; }
    .zone-start { display: flex; flex-direction: row; justify-content: space-between; align-items: center; width: 100%; }
    .zs-lbl { font-size: 8.5pt; font-weight: 600; color: #888; }
    .zs-val { font-size: 20pt; font-weight: 900; line-height: 1; }
    .zone-a .zs-val { color: #4a9a9d; }
    .zone-b .zs-val { color: #5aaa80; }`;
const PER_PAGE=20;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function makeDraw(n){
  const half=Math.floor(n/2),other=n-half;
  const zones=shuffle([...Array(half).fill('A'),...Array(other).fill('B')]);
  const aI=[],bI=[];
  zones.forEach((z,i)=>(z==='A'?aI:bI).push(i));
  const aS1=shuffle(Array.from({length:aI.length},(_,i)=>i+1));
  const bS1=shuffle(Array.from({length:bI.length},(_,i)=>i+1));
  const cards=Array(n);
  aI.forEach((ci,p)=>{cards[ci]={s1zone:'A',s1start:aS1[p]}});
  bI.forEach((ci,p)=>{cards[ci]={s1zone:'B',s1start:bS1[p]}});
  const aS2i=cards.map((c,i)=>c.s1zone==='B'?i:-1).filter(i=>i>=0);
  const bS2i=cards.map((c,i)=>c.s1zone==='A'?i:-1).filter(i=>i>=0);
  const aS2=shuffle(Array.from({length:aS2i.length},(_,i)=>i+1));
  const bS2=shuffle(Array.from({length:bS2i.length},(_,i)=>i+1));
  aS2i.forEach((ci,p)=>{cards[ci].s2zone='A';cards[ci].s2start=aS2[p]});
  bS2i.forEach((ci,p)=>{cards[ci].s2zone='B';cards[ci].s2start=bS2[p]});
  return cards;
}

function card(c,dl,t1,t2,ct){
  const z1=c.s1zone==='A'?'zone-a':'zone-b';
  const z2=c.s2zone==='A'?'zone-a':'zone-b';
  return `<div class="card">
    <div class="card-header">
      <div class="logo-wrap"><img src="${L1}" alt=""></div>
      <div class="hdr-title">${ct}<br>${dl}</div>
      <div class="logo-wrap" style="justify-content:flex-end"><img src="${L2}" alt=""></div>
    </div>
    <div class="card-body">
      <div class="col ${z1}">
        <div class="tour-label">${t1}</div>
        <div class="zone-start">
          <span class="zs-lbl">Зона</span><span class="zs-val">&nbsp;${c.s1zone}</span>
          <span class="zs-lbl">Старт</span><span class="zs-val">&nbsp;${c.s1start}</span>
        </div>
      </div>
      <div class="col-divider"></div>
      <div class="col ${z2}">
        <div class="tour-label">${t2}</div>
        <div class="zone-start">
          <span class="zs-lbl">Зона</span><span class="zs-val">&nbsp;${c.s2zone}</span>
          <span class="zs-lbl">Старт</span><span class="zs-val">&nbsp;${c.s2start}</span>
        </div>
      </div>
    </div>
  </div>`;
}

function pages(cards,dl,t1,t2,ct,pageLabel){
  let o='';
  const total=Math.ceil(cards.length/PER_PAGE);
  for(let i=0;i<cards.length;i+=PER_PAGE){
    const chunk=cards.slice(i,i+PER_PAGE);
    const pn=Math.floor(i/PER_PAGE)+1;
    const ts=total>1?`${pageLabel} — аркуш ${pn} з ${total}`:pageLabel;
    o+=`<div class="page">
      <div class="page-title">${ts}</div>
      <div class="cards-grid">${chunk.map(c=>card(c,dl,t1,t2,ct)).join('')}</div>
    </div>`;
  }
  return o;
}

function generate(){
  const n=Math.max(2,parseInt(document.getElementById('count').value)||48);
  const ct=document.getElementById('title').value.trim()||'Хижа Ліга Дідилів';
  document.getElementById('count').value=n;
  const d1=makeDraw(n),d2=makeDraw(n);
  document.getElementById('pages').innerHTML=
    `<div class="draw-section" id="s1"><h2>Жереб 1 — тури 1 і 2</h2>${pages(d1,'ЖЕРЕБ ТУР 1–2','ТУР 1','ТУР 2',ct,'ЖЕРЕБ ТУР 1–2')}</div>`+
    `<div class="draw-section" id="s2"><h2>Жереб 2 — тури 3 і 4</h2>${pages(d2,'ЖЕРЕБ ТУР 3–4','ТУР 3','ТУР 4',ct,'ЖЕРЕБ ТУР 3–4')}</div>`;
}

function printDraw(w){
  const s=document.getElementById(w===1?'s1':'s2');
  if(!s){alert('Спочатку натисни ЗРОБИТИ ЖЕРЕБ');return;}
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${PCSS}</style></head><body>`);
  s.querySelectorAll('.page').forEach(p=>win.document.write(p.outerHTML));
  win.document.write('</body></html>');
  win.document.close();
  win.onload=()=>win.print();
}

generate();
</script>
