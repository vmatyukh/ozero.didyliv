name: Daily Spinning Report

on:
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC = 20:00 Київ (UTC+2, літо UTC+3)
  workflow_dispatch:       # також можна запустити вручну

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily report
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_ADMIN_IDS: ${{ secrets.TG_ADMIN_IDS }}
        run: |
          node << 'JSEOF'
          const https = require('https');

          const today = new Date();
          // Київський час UTC+2 (влітку +3, але беремо +2 для простоти)
          today.setHours(today.getHours() + 2);
          const dateStr = today.toISOString().split('T')[0];
          const [y,m,d] = dateStr.split('-');

          function httpsGet(url){
            return new Promise((res,rej)=>{
              https.get(url, r=>{
                let data='';
                r.on('data',c=>data+=c);
                r.on('end',()=>res(JSON.parse(data)));
              }).on('error',rej);
            });
          }

          function httpsPost(url, body){
            return new Promise((res,rej)=>{
              const data = JSON.stringify(body);
              const u = new URL(url);
              const req = https.request({
                hostname: u.hostname,
                path: u.pathname,
                method: 'POST',
                headers: {'Content-Type':'application/json','Content-Length':Buffer.byteLength(data)}
              }, r=>{ let d=''; r.on('data',c=>d+=c); r.on('end',()=>res(JSON.parse(d))); });
              req.on('error',rej);
              req.write(data);
              req.end();
            });
          }

          async function main(){
            const dbUrl = process.env.FIREBASE_DB_URL.replace(/\/$/, '');
            const snap     = await httpsGet(`${dbUrl}/stats/${dateStr}/spinning.json`);
            const snapAbon = await httpsGet(`${dbUrl}/stats/${dateStr}/abonements.json`);

            const botToken = process.env.TELEGRAM_BOT_TOKEN;
            const adminIds = process.env.TELEGRAM_ADMIN_IDS.split(',');

            const entries     = (snap&&!snap.error)         ? Object.values(snap)     : [];
            const abonEntries = (snapAbon&&!snapAbon.error) ? Object.values(snapAbon) : [];

            let msg = `📊 Звіт за ${d}.${m}.${y}\n\n`;

            if(entries.length>0){
              const count      = entries.length;
              const freeCount  = entries.filter(e=>e.free).length;
              const paidCount  = count - freeCount;
              const total      = entries.reduce((s,e)=>s+(e.amount||0),0);
              const discounts  = entries.filter(e=>e.discount).length;
              const pidsaks    = entries.filter(e=>e.pidsak).length;
              const instruments= entries.filter(e=>e.instrument).length;
              const cardPayments= entries.filter(e=>e.cardPayment).length;
              const cash       = paidCount - cardPayments;
              msg+=`🎣 Спінінг\n`+
                `👥 Всього: ${count} (платних: ${paidCount}${freeCount?`, безкоштовних: ${freeCount}`:''})\n`+
                `💰 Сума: ${total} грн\n`+
                (cardPayments?`💳 Картка: ${cardPayments}\n`:'')+
                (cash        ?`💵 Готівка: ${cash}\n`       :'')+
                (discounts   ?`🎫 Пільга: ${discounts}\n`   :'')+
                (pidsaks     ?`🪣 Підсак: ${pidsaks}\n`     :'')+
                (instruments ?`🔧 Інструмент: ${instruments}\n`:'')+'\n';
            } else {
              msg+=`🎣 Спінінг: не було\n\n`;
            }

            if(abonEntries.length>0){
              const abonMonthly = abonEntries.filter(e=>e.type==='monthly').length;
              const abonSingle  = abonEntries.filter(e=>e.type==='single').length;
              const names = [...new Set(abonEntries.map(e=>e.name))].join(', ');
              msg+=`🎫 Абонементи\n`+
                `👥 Відвідали: ${abonEntries.length}\n`+
                (abonMonthly?`📅 Місячних: ${abonMonthly}\n`:'')+
                (abonSingle ?`🎟 Разових: ${abonSingle}\n` :'')+
                `👤 ${names}`;
            } else {
              msg+=`🎫 Абонементи: не було`;
            }

            for(const chat_id of adminIds){
              await httpsPost(
                `https://api.telegram.org/bot${botToken}/sendMessage`,
                { chat_id: chat_id.trim(), text: msg }
              );
            }
            console.log('Report sent:', msg);
          }

          main().catch(e=>{ console.error(e); process.exit(1); });
          JSEOF